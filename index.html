<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Floppy Bird</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        overflow:hidden;
        background:#4ec0ca;
        font-family:Arial, sans-serif;
    }

    canvas{
        display:block;
        margin:auto;
        background:linear-gradient(#6bd5ff,#dff8ff);
    }

    #score{
        position:absolute;
        top:15px;
        width:100%;
        text-align:center;
        font-size:40px;
        font-weight:bold;
        color:white;
        text-shadow:3px 3px 5px black;
        z-index:10;
    }

    #message{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        color:white;
        font-size:35px;
        text-align:center;
        font-weight:bold;
        text-shadow:3px 3px 5px black;
        animation:blink 1s infinite;
        z-index:10;
    }

    @keyframes blink{
        0%{opacity:1;}
        50%{opacity:0.3;}
        100%{opacity:1;}
    }
</style>
</head>
<body>

<div id="score">0</div>
<div id="message">
    CLICK OR SPACE TO START
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 450;
canvas.height = 700;

const scoreDiv = document.getElementById("score");
const message = document.getElementById("message");

let started = false;
let over = false;
let score = 0;
let frame = 0;

// ================= BIRD =================

const bird = {
    x:100,
    y:300,
    w:50,
    h:40,
    gravity:0.55,
    velocity:0,
    jump:-9,
    angle:0
};

// ================= PARTICLES =================

let particles = [];

// ================= PIPES =================

let pipes = [];
const gap = 180;
const pipeWidth = 85;

// ================= STARS =================

let stars = [];

for(let i=0;i<80;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*3
    });
}

// ================= MOUNTAINS =================

let mountains = [
    {x:0,h:180},
    {x:200,h:250},
    {x:400,h:200}
];

// ================= EVENTS =================

document.addEventListener("keydown",(e)=>{
    if(e.code==="Space"){
        flap();
    }
});

canvas.addEventListener("click", flap);

function flap(){

    if(!started){
        started = true;
        message.style.display="none";
    }

    if(over){
        location.reload();
    }

    bird.velocity = bird.jump;

    // Particle Burst
    for(let i=0;i<10;i++){
        particles.push({
            x:bird.x,
            y:bird.y,
            dx:(Math.random()-0.5)*4,
            dy:(Math.random()-0.5)*4,
            size:Math.random()*6+2,
            life:40
        });
    }
}

// ================= CREATE PIPE =================

function createPipe(){

    let top = Math.random()*250 + 80;

    pipes.push({
        x:canvas.width,
        top:top,
        bottom:top+gap,
        passed:false
    });
}

// ================= BACKGROUND =================

function drawSky(){

    // Animated gradient
    let gradient = ctx.createLinearGradient(0,0,0,canvas.height);

    gradient.addColorStop(0,"#4ec0ca");
    gradient.addColorStop(1,"#b6f5ff");

    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Stars twinkle
    stars.forEach(s=>{
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${
            Math.sin(frame*0.05+s.x)*0.5+0.5
        })`;

        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();
    });
}

// ================= SUN =================

function drawSun(){

    let pulse = Math.sin(frame*0.05)*10;

    ctx.beginPath();
    ctx.fillStyle = "#ffd93d";
    ctx.arc(370,120,55+pulse*0.2,0,Math.PI*2);
    ctx.fill();

    // Glow
    ctx.beginPath();
    ctx.fillStyle = "rgba(255,217,61,0.3)";
    ctx.arc(370,120,80+pulse,0,Math.PI*2);
    ctx.fill();
}

// ================= MOUNTAINS =================

function drawMountains(){

    mountains.forEach(m=>{

        ctx.fillStyle="#6ab04c";

        ctx.beginPath();
        ctx.moveTo(m.x,canvas.height-120);
        ctx.lineTo(m.x+100,canvas.height-m.h);
        ctx.lineTo(m.x+200,canvas.height-120);
        ctx.fill();

        m.x -= 0.5;

        if(m.x < -200){
            m.x = canvas.width;
        }
    });
}

// ================= GROUND =================

function drawGround(){

    ctx.fillStyle="#d2b48c";
    ctx.fillRect(0,canvas.height-120,canvas.width,120);

    ctx.fillStyle="#55ef55";
    ctx.fillRect(0,canvas.height-120,canvas.width,20);

    // Moving grass lines
    for(let i=0;i<canvas.width;i+=30){

        ctx.strokeStyle="#2ecc71";

        ctx.beginPath();
        ctx.moveTo((i+frame*2)%canvas.width,canvas.height-120);
        ctx.lineTo((i+frame*2)%canvas.width+10,canvas.height-90);
        ctx.stroke();
    }
}

// ================= BIRD =================

function drawBird(){

    ctx.save();

    bird.angle = bird.velocity * 0.05;

    ctx.translate(bird.x,bird.y);
    ctx.rotate(bird.angle);

    // Shadow
    ctx.beginPath();
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.ellipse(0,25,20,8,0,0,Math.PI*2);
    ctx.fill();

    // Body
    ctx.beginPath();
    ctx.fillStyle="#ffe600";
    ctx.ellipse(0,0,28,22,0,0,Math.PI*2);
    ctx.fill();

    // Belly
    ctx.beginPath();
    ctx.fillStyle="#fff4b3";
    ctx.ellipse(0,8,18,10,0,0,Math.PI*2);
    ctx.fill();

    // Wing Animation
    let wing = Math.sin(frame*0.5)*15;

    ctx.save();
    ctx.rotate(wing * Math.PI/180);

    ctx.beginPath();
    ctx.fillStyle="#ff9800";
    ctx.ellipse(-8,0,18,8,0,0,Math.PI*2);
    ctx.fill();

    ctx.restore();

    // Eye
    ctx.beginPath();
    ctx.fillStyle="white";
    ctx.arc(12,-8,7,0,Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.fillStyle="black";
    ctx.arc(14,-8,3,0,Math.PI*2);
    ctx.fill();

    // Beak
    ctx.beginPath();
    ctx.fillStyle="red";
    ctx.moveTo(25,0);
    ctx.lineTo(40,5);
    ctx.lineTo(25,10);
    ctx.fill();

    ctx.restore();
}

// ================= PARTICLES =================

function drawParticles(){

    particles.forEach((p,index)=>{

        ctx.beginPath();

        ctx.fillStyle=`rgba(255,255,255,${p.life/40})`;

        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        p.life--;

        if(p.life<=0){
            particles.splice(index,1);
        }
    });
}

// ================= PIPES =================

function drawPipes(){

    pipes.forEach(pipe=>{

        // Pipe Gradient
        let grad = ctx.createLinearGradient(pipe.x,0,pipe.x+pipeWidth,0);

        grad.addColorStop(0,"#27ae60");
        grad.addColorStop(1,"#2ecc71");

        ctx.fillStyle = grad;

        // Top
        ctx.fillRect(pipe.x,0,pipeWidth,pipe.top);

        // Bottom
        ctx.fillRect(
            pipe.x,
            pipe.bottom,
            pipeWidth,
            canvas.height
        );

        // Caps
        ctx.fillStyle="#1e8449";

        ctx.fillRect(pipe.x-5,pipe.top-25,pipeWidth+10,25);
        ctx.fillRect(pipe.x-5,pipe.bottom,pipeWidth+10,25);

        // Shine Animation
        ctx.fillStyle="rgba(255,255,255,0.25)";
        ctx.fillRect(pipe.x+10,0,10,pipe.top);
        ctx.fillRect(pipe.x+10,pipe.bottom,10,canvas.height);

    });
}

// ================= UPDATE =================

function update(){

    if(!started || over) return;

    frame++;

    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    // Pipe spawn
    if(frame % 100 === 0){
        createPipe();
    }

    pipes.forEach(pipe=>{

        pipe.x -= 3;

        // Score
        if(!pipe.passed && pipe.x+pipeWidth < bird.x){

            pipe.passed = true;
            score++;

            scoreDiv.innerText = score;

            // Score particles
            for(let i=0;i<20;i++){
                particles.push({
                    x:bird.x,
                    y:bird.y,
                    dx:(Math.random()-0.5)*8,
                    dy:(Math.random()-0.5)*8,
                    size:Math.random()*5,
                    life:50
                });
            }
        }

        // Collision
        if(
            bird.x + 25 > pipe.x &&
            bird.x - 25 < pipe.x + pipeWidth &&
            (
                bird.y - 20 < pipe.top ||
                bird.y + 20 > pipe.bottom
            )
        ){
            gameOver();
        }
    });

    pipes = pipes.filter(p=>p.x+pipeWidth>0);

    // Ground hit
    if(bird.y > canvas.height-140){
        gameOver();
    }

    // Top
    if(bird.y < 0){
        bird.y = 0;
    }
}

// ================= GAME OVER =================

function gameOver(){

    over = true;

    setTimeout(()=>{
        message.style.display="block";
        message.innerHTML = `
            GAME OVER<br>
            SCORE : ${score}<br><br>
            CLICK TO RESTART
        `;
    },500);
}

// ================= DRAW =================

function draw(){

    drawSky();
    drawSun();
    drawMountains();
    drawPipes();
    drawGround();
    drawParticles();
    drawBird();

    update();

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
